@REFLECTION_CONFIG[default]:NEEDS[TexturesUnlimited]
{
	%enabled = true
}

KSP_MODEL_SHADER
{
	name = fft-rcs-arcjet-1
	model = FarFutureTechnologies/Parts/Control/RCS/fft-rcs-arcjet-1
	TEXTURE
    {
        shader = TU/Metallic

        PROPERTY
		{
			name = _Color
			color = 1.2,1.2,1.2  //higher numbers are lighter
		}
		PROPERTY
		{
			name = _Metal
			float = 0.7  // 0>less metallic 1>more metallic(mirror finish)
		}
		PROPERTY
			{
			name = _Smoothness
			float = 0.7  // 1>less blurry 0>more blurry
		}
	}
}

